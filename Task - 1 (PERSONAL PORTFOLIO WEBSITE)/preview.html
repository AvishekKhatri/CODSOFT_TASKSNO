<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Device Simulator | Avishek Khatri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0f;
            --panel-bg: rgba(17, 17, 24, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #6c63ff;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        [data-theme="light"] {
            --bg-color: #f3f4f6;
            --panel-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --accent-color: #4f46e5;
            --shadow: 0 8px 32px 0 rgba(31, 41, 55, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Simulation Bar */
        .simulator-bar {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-color);
            text-decoration: none;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
        }

        .btn.active {
            background: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Device Container Wrapper */
        .device-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Phone Frame Style */
        .device-wrapper.mobile .iframe-container {
            width: 375px;
            height: 812px;
            border-radius: 40px;
            border: 12px solid #1f2937;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .device-wrapper.mobile .iframe-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #1f2937;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        /* Tablet Frame Style */
        .device-wrapper.tablet .iframe-container {
            width: 768px;
            height: 1024px;
            border-radius: 24px;
            border: 16px solid #1f2937;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 95%;
        }

        /* Desktop Frame Style */
        .device-wrapper.desktop .iframe-container {
            width: 100%;
            height: 100%;
            border-radius: 0;
            border: none;
            box-shadow: none;
        }

        .iframe-container {
            background: #000;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0a0f;
        }

        .dimensions-badge {
            position: absolute;
            bottom: 1.5rem;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            backdrop-filter: blur(8px);
            pointer-events: none;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <header class="simulator-bar">
        <a href="index.html" class="logo-area">
            &lt; Avishek Khatri /&gt; <span style="font-weight:400; font-size:0.9rem; color:var(--text-muted);">Simulator</span>
        </a>

        <div class="controls">
            <button class="btn active" id="desktopBtn" onclick="setDevice('desktop')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                Desktop
            </button>
            <button class="btn" id="tabletBtn" onclick="setDevice('tablet')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                Tablet
            </button>
            <button class="btn" id="mobileBtn" onclick="setDevice('mobile')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                Mobile
            </button>
        </div>

        <div>
            <a href="index.html" class="btn">
                Back to Site
            </a>
        </div>
    </header>

    <main class="preview-container">
        <div class="device-wrapper desktop" id="deviceWrapper">
            <div class="iframe-container">
                <iframe src="index.html" id="previewIframe"></iframe>
            </div>
        </div>

        <div class="dimensions-badge" id="dimensions">1920px × 1080px (Fluid)</div>
    </main>

    <script>
        // Synchronize dark/light mode from localStorage if existing
        const savedTheme = localStorage.getItem('portfolio-theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        const dimensions = {
            desktop: "1920px × 1080px (Fluid)",
            tablet: "768px × 1024px (iPad Portrait)",
            mobile: "375px × 812px (iPhone X)"
        };

        function setDevice(device) {
            // Update wrapper class
            const wrapper = document.getElementById('deviceWrapper');
            wrapper.className = 'device-wrapper ' + device;

            // Update active buttons
            document.getElementById('desktopBtn').classList.remove('active');
            document.getElementById('tabletBtn').classList.remove('active');
            document.getElementById('mobileBtn').classList.remove('active');

            document.getElementById(device + 'Btn').classList.add('active');

            // Update badge text
            document.getElementById('dimensions').innerText = dimensions[device];
        }
    </script>
</body>
</html>

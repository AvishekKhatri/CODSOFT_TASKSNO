<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spendora</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="logo-section">
                <div class="logo-icon-container">
                    <i data-lucide="pocket"></i>
                </div>
                <span class="logo-title">Spendora</span>
            </div>

            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to manage your financial dashboard</p>
            </div>

            <!-- Login Form -->
            <form id="form-login">
                <div class="form-group">
                    <label class="form-label" for="login-email">Email Address</label>
                    <div class="form-input-wrapper">
                        <input type="email" class="form-input" id="login-email" placeholder="name@example.com" required>
                    </div>
                    <span class="error-msg" id="err-login-email"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="login-password">Password</label>
                    <div class="form-input-wrapper">
                        <input type="password" class="form-input" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="form-input-icon" id="toggle-login-password" aria-label="Toggle Password Visibility">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <span class="error-msg" id="err-login-password"></span>
                </div>

                <div class="form-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        Remember Me
                    </label>
                    <a href="forgot-password.html" class="auth-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn" id="btn-login-submit">
                    Sign In <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <!-- Social Login Divider & Button -->
            <div class="auth-divider">or continue with</div>
            <button type="button" class="btn btn-google" id="btn-google-login">
                <svg class="google-logo" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.67 0 3.2.58 4.4 1.71l3.26-3.26C17.7 1.64 15.06 1 12 1 7.24 1 3.2 3.73 1.25 7.72l3.87 3a6.97 6.97 0 0 1 6.88-5.68z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.44a5.5 5.5 0 0 1-2.39 3.61l3.71 2.88c2.17-2 3.73-4.94 3.73-8.64z"/>
                    <path fill="#FBBC05" d="M5.12 10.72A7 7 0 0 1 5.12 7.7l-3.87-3a11.95 11.95 0 0 0 0 11.02l3.87-3z"/>
                    <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.71-2.88a7 7 0 0 1-10.74-3.79l-3.89 3A11.94 11.94 0 0 0 12 23z"/>
                </svg>
                Sign In with Google
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Loading Spinner Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- CDNs for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Init Lucide Icons
        lucide.createIcons();
    </script>

    <!-- App Logic Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Form & Button elements
        const formLogin = document.getElementById('form-login');
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const rememberMeInput = document.getElementById('remember-me');
        const togglePassword = document.getElementById('toggle-login-password');
        const btnGoogleLogin = document.getElementById('btn-google-login');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Toggle Password visibility
        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.innerHTML = `<i data-lucide="${isPassword ? 'eye-off' : 'eye'}"></i>`;
            lucide.createIcons();
        });

        // Handle form submit
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear errors
            document.getElementById('err-login-email').textContent = '';
            document.getElementById('err-login-password').textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const rememberMe = rememberMeInput.checked;

            // Client Validation
            const validation = ValidationManager.validateSignIn(email, password);
            if (!validation.isValid) {
                if (validation.errors.email) document.getElementById('err-login-email').textContent = validation.errors.email;
                if (validation.errors.password) document.getElementById('err-login-password').textContent = validation.errors.password;
                return;
            }

            // Start loading spinner
            loadingOverlay.classList.add('active');

            const result = await AuthManager.signIn(email, password, rememberMe);
            
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                loadingOverlay.classList.remove('active');
                document.getElementById('err-login-password').textContent = result.error;
            }
        });

        // Handle Google Login submit
        btnGoogleLogin.addEventListener('click', async () => {
            loadingOverlay.classList.add('active');
            const result = await AuthManager.signInWithGoogle();
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                loadingOverlay.classList.remove('active');
                alert(result.error); // Alert fallback for social login failure context
            }
        });

        // Auth guard: If already logged in, redirect directly to dashboard
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>

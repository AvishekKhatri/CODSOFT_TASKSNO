<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Spendora</title>
    <link class="styles" rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="logo-section">
                <div class="logo-icon-container">
                    <i data-lucide="pocket"></i>
                </div>
                <span class="logo-title">Spendora</span>
            </div>

            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>We'll send a password recovery link to your email</p>
            </div>

            <!-- Recovery Form -->
            <form id="form-forgot">
                <div class="form-group">
                    <label class="form-label" for="forgot-email">Email Address</label>
                    <div class="form-input-wrapper">
                        <input type="email" class="form-input" id="forgot-email" placeholder="name@example.com" required>
                    </div>
                    <span class="error-msg" id="err-forgot-email"></span>
                    <span style="color: var(--color-success); font-size: 13px; margin-top: 6px; display: block;" id="success-forgot-email"></span>
                </div>

                <button type="submit" class="btn" id="btn-forgot-submit" style="margin-top: 10px;">
                    Send Reset Link <i data-lucide="mail"></i>
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html" class="auth-link">Login</a>
            </div>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html" class="auth-link">Create Account</a>
            </div>
        </div>
    </div>

    <!-- Loading Spinner Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- CDNs for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Init Lucide Icons
        lucide.createIcons();
    </script>

    <!-- App Logic Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const formForgot = document.getElementById('form-forgot');
        const emailInput = document.getElementById('forgot-email');
        const loadingOverlay = document.getElementById('loading-overlay');
        const errorMsg = document.getElementById('err-forgot-email');
        const successMsg = document.getElementById('success-forgot-email');

        formForgot.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';
            successMsg.textContent = '';

            const email = emailInput.value.trim();

            if (!email || !ValidationManager.validateEmail(email)) {
                errorMsg.textContent = 'Please enter a valid email address';
                return;
            }

            loadingOverlay.classList.add('active');

            const result = await AuthManager.resetPassword(email);

            loadingOverlay.classList.remove('active');

            if (result.success) {
                successMsg.textContent = 'A reset link has been dispatched! Please verify your inbox.';
                emailInput.value = '';
            } else {
                errorMsg.textContent = result.error;
            }
        });
    </script>
</body>
</html>

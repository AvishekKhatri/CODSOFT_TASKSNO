<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendora - Premium Expense Tracker</title>
    <meta name="description" content="Manage your personal finances, track spending, view trends, and maintain budgets with Spendora.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 50%, #e8eaf6 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .splash {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }
        .splash-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .splash-logo svg {
            width: 28px; height: 28px;
            fill: none; stroke: white; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .splash-title {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .splash-spinner {
            width: 28px; height: 28px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-logo">
            <svg viewBox="0 0 24 24"><path d="M2 8a4 4 0 0 1 4-4h12a4 4 0 0 1 4 4v2H2V8z"/><path d="M2 10h20v6a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V10z"/></svg>
        </div>
        <h1 class="splash-title">Spendora</h1>
        <div class="splash-spinner"></div>
    </div>

    <!-- Firebase Auth check to route user -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script>
        // Redirect based on authentication state
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.replace('dashboard.html');
            } else {
                window.location.replace('login.html');
            }
        });

        // Fallback: if Firebase takes too long, go to login after 4 seconds
        setTimeout(() => {
            if (window.location.pathname.endsWith('index.html') || window.location.pathname === '/') {
                window.location.replace('login.html');
            }
        }, 4000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to ZenTask — your modular task planner.">
    <title>ZenTask | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth Page Wrapper -->
    <div class="auth-page">
        <!-- Header bar for branding and theme -->
        <header class="auth-header">
            <div class="header-logo">
                <span class="logo-icon" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                </span>
                <h1>ZenTask</h1>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode" title="Toggle theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </header>

        <!-- Login Card -->
        <div class="auth-card glass-card">
            <div class="auth-card-header">
                <h2>Welcome Back</h2>
                <p>Sign in to access your task dashboard</p>
            </div>

            <form id="login-form" novalidate>
                <!-- Email Field -->
                <div class="auth-form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <input type="email" id="login-email" placeholder="you@example.com" required autofocus aria-required="true">
                    </div>
                    <span class="auth-error" id="login-email-error" role="alert"></span>
                </div>

                <!-- Password Field -->
                <div class="auth-form-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="login-password" placeholder="Enter your password" required aria-required="true">
                        <button type="button" class="password-toggle" id="toggle-login-pw" aria-label="Toggle password visibility" title="Show password">
                            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
                        </button>
                    </div>
                    <span class="auth-error" id="login-password-error" role="alert"></span>
                </div>

                <!-- Error Banner -->
                <div id="login-error-banner" class="auth-error-banner" style="display:none;"></div>

                <!-- Submit -->
                <button type="submit" class="primary-btn btn-block" id="login-submit-btn">Sign In</button>
            </form>

            <div class="auth-divider"><span>OR</span></div>

            <!-- Google Sign-In -->
            <button type="button" class="google-btn" id="google-login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                Continue with Google
            </button>

            <p class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase.js';
        import { signInWithEmail, signInWithGoogle, onAuthChange } from './js/auth.js';
        import { StorageController } from './js/storage.js';
        import { ThemeController } from './js/theme.js';

        document.addEventListener('DOMContentLoaded', () => {
            ThemeController.init();
            document.getElementById('theme-toggle').addEventListener('click', () => ThemeController.toggle());

            onAuthChange((user) => { if (user) window.location.href = 'index.html'; });

            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('login-email');
            const pwInput = document.getElementById('login-password');
            const emailError = document.getElementById('login-email-error');
            const pwError = document.getElementById('login-password-error');
            const banner = document.getElementById('login-error-banner');
            const submitBtn = document.getElementById('login-submit-btn');

            const clearErrors = () => {
                emailError.textContent = '';
                pwError.textContent = '';
                banner.style.display = 'none';
            };

            emailInput.addEventListener('input', clearErrors);
            pwInput.addEventListener('input', clearErrors);

            // Toggle password visibility
            document.getElementById('toggle-login-pw').addEventListener('click', () => {
                const isPassword = pwInput.type === 'password';
                pwInput.type = isPassword ? 'text' : 'password';
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearErrors();
                const email = emailInput.value.trim();
                const password = pwInput.value;

                if (!email) { emailError.textContent = 'Email is required.'; return; }
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { emailError.textContent = 'Enter a valid email.'; return; }
                if (!password) { pwError.textContent = 'Password is required.'; return; }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';
                const result = await signInWithEmail(email, password);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';

                if (!result.success) {
                    banner.textContent = result.error;
                    banner.style.display = 'block';
                }
            });

            document.getElementById('google-login-btn').addEventListener('click', async () => {
                const result = await signInWithGoogle();
                if (!result.success) {
                    banner.textContent = result.error;
                    banner.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
